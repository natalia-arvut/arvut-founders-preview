<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex, nofollow">
<title>Geschützter Bereich · Arvut</title>
<link rel="icon" href="/favicon.ico">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@700;800&family=Hanken+Grotesk:wght@400;500&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#fcfaf4; --ink:#303030; --ink-2:#4f5d5a; --ink-3:#8a948f;
    --teal:#AB9954; --teal-d:#7E6F3A; --on-teal:#fbfaf3; --line:#dcdcd8;
    --f-display:"Archivo",Arial,sans-serif; --f-body:"Hanken Grotesk",system-ui,sans-serif;
    --f-mono:"JetBrains Mono",ui-monospace,Menlo,monospace;
  }
  *{box-sizing:border-box}
  body{margin:0;min-height:100vh;background:var(--paper);color:var(--ink-2);
    font-family:var(--f-body);display:grid;place-items:center;padding:24px;
    -webkit-font-smoothing:antialiased}
  .card{width:100%;max-width:440px}
  .eyebrow{font-family:var(--f-mono);font-size:.74rem;letter-spacing:.18em;
    text-transform:uppercase;color:var(--teal-d);display:inline-flex;align-items:center;
    gap:.7em;margin-bottom:1.4rem}
  .eyebrow::before{content:"";width:30px;height:1px;background:var(--teal)}
  h1{font-family:var(--f-display);font-weight:800;text-transform:uppercase;color:var(--ink);
    font-size:clamp(1.9rem,7vw,2.7rem);line-height:.95;letter-spacing:-.03em;margin:0 0 1rem}
  h1 .tl{color:var(--teal-d)}
  p.lead{font-size:1.02rem;line-height:1.5;color:var(--ink-2);margin:0 0 1.8rem;max-width:40ch}
  form{display:flex;flex-direction:column;gap:.9rem}
  label{font-family:var(--f-mono);font-size:.7rem;text-transform:uppercase;
    letter-spacing:.07em;color:var(--ink-3)}
  input{width:100%;padding:.95rem 1.05rem;border:1px solid var(--line);background:#fff;
    font-family:var(--f-mono);font-size:1.2rem;letter-spacing:.18em;color:var(--ink);
    border-radius:8px;text-align:center}
  input:focus{outline:none;border-color:var(--teal-d)}
  button{margin-top:.3rem;display:inline-flex;align-items:center;justify-content:center;
    gap:.6em;background:var(--teal);color:var(--on-teal);font-family:var(--f-mono);
    font-size:.84rem;font-weight:500;letter-spacing:.05em;text-transform:uppercase;
    padding:1.05em 1.7em;border:2px solid var(--teal);border-radius:8px;cursor:pointer;
    transition:background .2s,transform .15s}
  button:hover{background:var(--teal-d);border-color:var(--teal-d);transform:translateY(-2px)}
  .err{font-family:var(--f-mono);font-size:.78rem;color:#b4452f;margin:0 0 1rem;display:none}
  .err.show{display:block}
  .foot{margin-top:2.4rem;font-family:var(--f-mono);font-size:.72rem;color:var(--ink-3);
    letter-spacing:.04em}
</style>
</head>
<body>
  <main class="card">
    <span class="eyebrow">Geschützter Bereich</span>
    <h1>Arvut <span class="tl">×</span> AAR</h1>
    <p class="lead">Dokumente der Zusammenarbeit Arvut–AAR. Bitte geben Sie den Zugangscode ein.</p>
    <p class="err" id="err">Ungültiger Code. Bitte erneut versuchen.</p>
    <form id="f">
      <label for="p">Zugangscode</label>
      <input id="p" name="k" inputmode="numeric" autocomplete="off" autofocus
             placeholder="••••" aria-label="Zugangscode">
      <button type="submit">Eintreten →</button>
    </form>
    <p class="foot">ARVUT · arvut.ch</p>
  </main>
<script src="/hub-gate.js" data-hub="/aar"></script>
</body>
</html>
