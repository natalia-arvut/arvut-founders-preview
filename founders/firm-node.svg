<svg class="firm-node" viewBox="0 0 640 560" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="">
  <style>
    .fn-star{transform-box:fill-box;transform-origin:center;animation:fnpk 2.8s ease-in-out infinite}
    .fn-co{transform-box:fill-box;transform-origin:center;animation:fnco 2.8s ease-in-out infinite}
    @keyframes fnpk{0%,100%{opacity:.7;transform:scale(.85)}50%{opacity:1;transform:scale(1.12)}}
    @keyframes fnco{0%,100%{opacity:.35;transform:scale(.6)}50%{opacity:1;transform:scale(1.25)}}
    @media (prefers-reduced-motion:reduce){.fn-star,.fn-co{animation:none;opacity:1}}
  </style>
  <defs>
    <filter id="fnglow" x="-120%" y="-120%" width="340%" height="340%">
      <feGaussianBlur stdDeviation="5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- сеть: тонкие связи между узлами -->
  <g stroke="#00787c" stroke-width="1.4" stroke-opacity="0.5" fill="none" stroke-linecap="round">
    <path d="M120 96 L300 250"/>
    <path d="M540 120 L360 250"/>
    <path d="M92 430 L300 330"/>
    <path d="M560 452 L360 330"/>
    <path d="M300 250 L360 250"/>
  </g>

  <!-- фундамент / линия земли -->
  <line x1="70" y1="470" x2="570" y2="470" stroke="#009B9F" stroke-width="2.2" stroke-linecap="round"/>

  <!-- здание фирмы -->
  <g fill="none" stroke="#009B9F" stroke-width="2.6" stroke-linejoin="round">
    <rect x="232" y="212" width="176" height="258" rx="6"/>
    <!-- крыша-карниз -->
    <path d="M222 212 L418 212"/>
    <!-- этажи -->
    <line x1="232" y1="270" x2="408" y2="270"/>
    <line x1="232" y1="326" x2="408" y2="326"/>
    <line x1="232" y1="382" x2="408" y2="382"/>
  </g>

  <!-- окна -->
  <g fill="none" stroke="#00787c" stroke-width="2">
    <rect x="252" y="228" width="30" height="26" rx="3"/>
    <rect x="305" y="228" width="30" height="26" rx="3"/>
    <rect x="358" y="228" width="30" height="26" rx="3"/>
    <rect x="252" y="284" width="30" height="26" rx="3"/>
    <rect x="305" y="284" width="30" height="26" rx="3"/>
    <rect x="358" y="284" width="30" height="26" rx="3"/>
    <rect x="252" y="340" width="30" height="26" rx="3"/>
    <rect x="358" y="340" width="30" height="26" rx="3"/>
  </g>

  <!-- дверь + табличка «ваше имя» -->
  <g>
    <rect x="298" y="404" width="44" height="66" rx="4" fill="none" stroke="#009B9F" stroke-width="2.6"/>
    <rect x="305" y="352" width="90" height="16" rx="3" fill="#009B9F" opacity="0.9"/>
    <line x1="316" y1="360" x2="384" y2="360" stroke="#FBFAF3" stroke-width="2" stroke-linecap="round" opacity="0.75"/>
  </g>

  <!-- узлы сети (звёздочки как на карте сайта) -->
  <g filter="url(#fnglow)">
    <path class="fn-star" d="M120 78 C123 92 123 92 137 96 C123 100 123 100 120 114 C117 100 117 100 103 96 C117 92 117 92 120 78 Z" fill="#009B9F"/>
    <path class="fn-co" style="animation-delay:.4s" d="M120 88 C121.6 94 121.6 94 128 96 C121.6 98 121.6 98 120 104 C118.4 98 118.4 98 112 96 C118.4 94 118.4 94 120 88 Z" fill="#FBFAF3"/>
  </g>
  <g filter="url(#fnglow)">
    <path class="fn-star" style="animation-delay:1.1s" d="M540 102 C543 116 543 116 557 120 C543 124 543 124 540 138 C537 124 537 124 523 120 C537 116 537 116 540 102 Z" fill="#009B9F"/>
    <path class="fn-co" style="animation-delay:1.1s" d="M540 112 C541.6 118 541.6 118 548 120 C541.6 122 541.6 122 540 128 C538.4 122 538.4 122 532 120 C538.4 118 538.4 118 540 112 Z" fill="#FBFAF3"/>
  </g>
  <g filter="url(#fnglow)">
    <path class="fn-star" style="animation-delay:1.8s" d="M92 412 C95 426 95 426 109 430 C95 434 95 434 92 448 C89 434 89 434 75 430 C89 426 89 426 92 412 Z" fill="#009B9F"/>
    <path class="fn-co" style="animation-delay:1.8s" d="M92 422 C93.6 428 93.6 428 100 430 C93.6 432 93.6 432 92 438 C90.4 432 90.4 432 84 430 C90.4 428 90.4 428 92 422 Z" fill="#FBFAF3"/>
  </g>
  <g filter="url(#fnglow)">
    <path class="fn-star" style="animation-delay:2.4s" d="M560 434 C563 448 563 448 577 452 C563 456 563 456 560 470 C557 456 557 456 543 452 C557 448 557 448 560 434 Z" fill="#009B9F"/>
    <path class="fn-co" style="animation-delay:2.4s" d="M560 444 C561.6 450 561.6 450 568 452 C561.6 454 561.6 454 560 460 C558.4 454 558.4 454 552 452 C558.4 450 558.4 450 560 444 Z" fill="#FBFAF3"/>
  </g>
</svg>
